<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Livdle</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; background-color: #f0f7fa; color: #333; }
        .container { max-width: 500px; margin: 40px auto; padding: 20px; background: white; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        /* Title remains Blue */
        h1 { color: #5dade2; font-style: italic; margin-bottom: 5px; }
        .subtitle { color: #5dade2; font-size: 0.9em; margin-bottom: 15px; }

        /* Dropdown Styling */
        .selector-container { margin-bottom: 25px; }
        #daySelect {
            padding: 10px 15px;
            border: 2px solid #5dade2;
            border-radius: 6px;
            background-color: white;
            color: #333;
            font-weight: bold;
            font-size: 0.95em;
            cursor: pointer;
            outline: none;
            transition: 0.2s;
        }
        #daySelect:hover { border-color: #3498db; }

        /* Guess tiles are now Pink-themed */
        .guesses { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .guess-box { 
            border: 2px solid #fce7f3; /* Light pink border */
            padding: 12px; 
            border-radius: 6px; 
            height: 20px; 
            font-weight: bold; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background-color: #fdf2f8; /* Very light pink background */
        }

        /* Progress bar is now Pink */
        .progress-bar { width: 100%; height: 20px; background-color: #fce7f3; border-radius: 10px; overflow: hidden; position: relative; margin-bottom: 20px; }
        .progress-fill { height: 100%; background-color: #f2b6d5; width: 0%; pointer-events: none;}
        .marker { border-left: 2px solid white; height: 100%; position: absolute; top: 0; }

        /* Buttons/Controls remain Blue */
        .controls { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        button { background-color: #5dade2; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1em; transition: 0.2s;}
        button:hover { background-color: #3498db; }
        button:disabled { background-color: #aed6f1; cursor: not-allowed; }

        .search-container { 
            display: flex; 
            gap: 10px; 
            position: relative; 
            width: 100%; 
            margin-bottom: 20px; 
        }

        #guessBtn {
            background-color: #5dade2; 
            color: white; 
            border: none; 
            padding: 0 20px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold;
        }

        #song-input {
            width: 100%; padding: 12px; border: 2px solid #fce7f3; 
            border-radius: 6px; box-sizing: border-box; font-size: 1em;
        }

        .autocomplete-items {
            position: absolute; border: 1px solid #d6eaf8;
            border-top: none; z-index: 99; top: 100%; left: 0; right: 0;
            background-color: white; max-height: 200px; overflow-y: auto;
        }

        .autocomplete-items div {
            padding: 10px; cursor: pointer; border-bottom: 1px solid #fce7f3;
        }

        .autocomplete-items div:hover { background-color: #fdf2f8; }

        #message { font-weight: bold; font-size: 1.2em; margin-top: 20px; color: #5dade2; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Livdle</h1>
        <p class="subtitle">Guess the Olivia song</p>
        
        <div class="selector-container">
            <label for="daySelect" style="font-weight: bold; color: #5dade2; margin-right: 5px;">Select Day:</label>
            <select id="daySelect"></select>
        </div>

        <div id="streak-display" style="color: #f2b6d5; font-weight: bold; margin-bottom: 15px; font-size: 0.85em;"></div>
        
        <div class="guesses" id="guesses">
            <div class="guess-box"></div>
            <div class="guess-box"></div>
            <div class="guess-box"></div>
            <div class="guess-box"></div>
            <div class="guess-box"></div>
            <div class="guess-box"></div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progress"></div>
            <div class="marker" style="left: 16.67%"></div>
            <div class="marker" style="left: 33.33%"></div>
            <div class="marker" style="left: 50%"></div>
            <div class="marker" style="left: 66.67%"></div>
            <div class="marker" style="left: 83.33%"></div>
        </div>

        <div class="controls">
            <button id="playBtn" disabled>Loading Audio...</button>
            <button id="skipBtn">Skip</button>
        </div>

        <div class="search-container">
            <input type="text" id="song-input" placeholder="Search for a song..." autocomplete="off">
            <button id="guessBtn">Submit</button>
            <div id="autocomplete-list" class="autocomplete-items"></div>
        </div>

        <p id="message"></p>
    </div>
    
    <div id="yt-player" style="position:absolute;left:-999px;width:1px;height:1px;"></div>
    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        const intervals = [2, 4, 6, 8, 10, 12];
        let currentAttempt = 0;
        let isPlaying = false;
        let gameWon = false;
        let player = null;
        let pollInterval = null;

        // --- Daily song rotation ---
        const dailySongs = [
            { name: "good 4 u",                     videoId: "gNi_6U5Pm_o", startAt: 16 },
            { name: "drivers license",                 videoId: "ZmDBbnmKpqQ", startAt: 5 },
            { name: "maggots for brains",              videoId: "ak7nZ5J2E5k", startAt: 0 },
            { name: "pretty isn't pretty",             videoId: "G0R7Z2A0XeY", startAt: 0 },
            { name: "ballad of a homeschooled girl",   videoId: "obSpLSnJ-wI", startAt: 0 },
            { name: "so american",                     videoId: "W-PGNyhmSKA", startAt: 0 },
            { name: "the cure",                        videoId: "UbbrZTfjkdk", startAt: 0 },
            { name: "girl i've always been",           videoId: "1-dT9r5nbks", startAt: 0 },
            { name: "obsessed",                        videoId: "CxFa6r8uRNw", startAt: 0 },
            { name: "drop dead",                        videoId: "t_OyQhiqXgA", startAt: 0 },
            { name: "begged",                        videoId: "NmGGDYyJ8tU", startAt: 0 },
            { name: "vampire",                        videoId: "Fqey8LxQxFU", startAt: 0 },
            { name: "traitor",                        videoId: "6tsu2oeZJgo", startAt: 0 },
            { name: "deja vu",                        videoId: "cii6ruuycQA", startAt: 0 },
            { name: "brutal",                        videoId: "hM2U8cb8lhI", startAt: 0 },
            { name: "lacy",                            videoId: "_IB5EYuz3XM", startAt: 0 },
            { name: "bad idea right?",                 videoId: "zla_eLVFiDU", startAt: 0 },
            { name: "get him back!",                   videoId: "ZsJ-BHohXRI", startAt: 0 },
            { name: "jealousy, jealousy",              videoId: "Z-9gQjUZMm0", startAt: 0 },
            { name: "expectations",                    videoId: "nBv5BzFpvvE", startAt: 0 },
            { name: "favorite crime",                  videoId: "AyX_LL9nWSE", startAt: 0 },
        ];

        const startDate = new Date("2026-06-28T00:00:00");
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const todayIndex = Math.floor((today - startDate) / 86400000) % dailySongs.length;
        
        // Dynamic game targets initialized via loadDay()
        let answer = "";
        let videoId = "";
        let startAt = 0;

        const playBtn = document.getElementById('playBtn');
        const skipBtn = document.getElementById('skipBtn');
        const guessBtn = document.getElementById('guessBtn');
        const songInput = document.getElementById('song-input');
        const daySelect = document.getElementById('daySelect');
        const progress = document.getElementById('progress');
        const guessesEl = document.querySelectorAll('.guess-box');
        const messageEl = document.getElementById('message');

        // Populate Dropdown Menus
        dailySongs.forEach((song, index) => {
            const opt = document.createElement('option');
            opt.value = index;
            opt.textContent = `Day ${index + 1} ${index === todayIndex ? "(Today)" : ""}`;
            daySelect.appendChild(opt);
        });
        daySelect.value = todayIndex;

        // Setup dropdown change listener
        daySelect.addEventListener('change', (e) => {
            loadDay(parseInt(e.target.value));
        });

        // Function to load/reset the game configuration for a selected day
        function loadDay(index) {
            if (player && typeof player.pauseVideo === 'function') {
                stopPlayback();
            }

            const activeSong = dailySongs[Math.max(0, index)];
            answer = activeSong.name;
            videoId = activeSong.videoId;
            startAt = activeSong.startAt || 0;

            // Reset engine parameters
            currentAttempt = 0;
            gameWon = false;
            isPlaying = false;

            // Clean up UI
            messageEl.innerText = "";
            songInput.value = "";
            songInput.disabled = false;
            skipBtn.disabled = false;
            guessBtn.disabled = false;
            progress.style.width = '0%';

            guessesEl.forEach(box => {
                box.innerText = "";
                box.style.backgroundColor = "#fdf2f8";
                box.style.borderColor = "#fce7f3";
            });

            // Update Audio Stream Target if Player API exists
            if (player && typeof player.cueVideoById === 'function') {
                if (!videoId) {
                    messageEl.innerText = "No video ID set for this day's song.";
                    playBtn.disabled = true;
                    playBtn.innerText = "Unavailable";
                    return;
                }
                player.cueVideoById({
                    videoId: videoId,
                    startSeconds: startAt
                });
                playBtn.disabled = false;
                playBtn.innerText = "Play Audio";
            }
        }

        // --- Curated song list ---
        const allSongs = [
            "1 step forward, 3 steps back",
            "All I Want",
            "Can't Catch Me Now (from The Hunger Games: The Ballad of Songbirds & Snakes)",
            "Granted",
            "I Think I Kinda, You Know (Nini Version)",
            "Out of the Old",
            "River",
            "Start of Something New (Nini Version)",
            "The Best Part",
            "The Rose Song",
            "YAC Alma Mater (Nini Version)",
            "all-american bitch",
            "bad idea right?",
            "ballad of a homeschooled girl",
            "begged",
            "brutal",
            "cigarette smoke",
            "deja vu",
            "drivers license",
            "drop dead",
            "enough for you",
            "expectations",
            "favorite crime",
            "get him back!",
            "girl i've always been",
            "good 4 u",
            "happier",
            "honeybee",
            "hope ur ok",
            "jealousy, jealousy",
            "lacy",
            "less",
            "logical",
            "love is embarrassing",
            "maggots for brains",
            "making the bed",
            "my way",
            "obsessed",
            "pretty isn't pretty",
            "purple",
            "scared of my guitar",
            "so american",
            "stranger",
            "stupid song",
            "teenage dream",
            "the cure",
            "the grudge",
            "traitor",
            "u + me = <3",
            "vampire",
        ].sort((a, b) => a.localeCompare(b));

        const input = document.getElementById("song-input");
        const list = document.getElementById("autocomplete-list");
        input.addEventListener("input", function() {
            list.innerHTML = "";
            const val = this.value.toLowerCase();
            if (!val) return;

            const filtered = allSongs.filter(song => song.toLowerCase().includes(val));

            filtered.forEach(song => {
                const div = document.createElement("div");
                div.innerText = song;
                div.onclick = () => {
                    input.value = song;
                    list.innerHTML = ""; 
                };
                list.appendChild(div);
            });
        });

        // YouTube IFrame API ready callback
        function onYouTubeIframeAPIReady() {
            if (!videoId) {
                messageEl.innerText = "No video ID set for today's song.";
                return;
            }
            player = new YT.Player('yt-player', {
                width: '1',
                height: '1',
                videoId: videoId,
                playerVars: {
                    autoplay: 0,
                    controls: 0,
                    disablekb: 1,
                    fs: 0,
                    iv_load_policy: 3,
                    modestbranding: 1,
                    rel: 0,
                },
                events: {
                    onReady: () => {
                        player.seekTo(startAt);
                        playBtn.disabled = false;
                        playBtn.innerText = "Play Audio";
                    },
                    onStateChange: (e) => {
                        if (e.data === YT.PlayerState.ENDED) {
                            stopPlayback();
                        }
                    }
                }
            });
        }

        function startPolling() {
            stopPolling();
            pollInterval = setInterval(() => {
                if (!player) return;
                const currentSec = player.getCurrentTime() - startAt;
                const maxSec = (gameWon || currentAttempt >= 6) ? intervals[intervals.length - 1] : intervals[currentAttempt];
                const percent = (currentSec / intervals[intervals.length - 1]) * 100;
                progress.style.width = percent + '%';

                if (currentSec >= maxSec) {
                    stopPlayback();
                }
            }, 50);
        }

        function stopPolling() {
            if (pollInterval) {
                clearInterval(pollInterval);
                pollInterval = null;
            }
        }

        function stopPlayback() {
            stopPolling();
            player.pauseVideo();
            player.seekTo(startAt);
            isPlaying = false;
            playBtn.innerText = "Play Audio";
            progress.style.width = '0%';
        }

        playBtn.addEventListener('click', () => {
            if (!isPlaying) {
                player.seekTo(startAt);
                player.playVideo();
                isPlaying = true;
                playBtn.innerText = "Playing...";
                startPolling();
            }
        });

        function handleGuess(guess) {
            if (currentAttempt >= 6 || gameWon) return;

            if (guess.toLowerCase().trim() === answer.toLowerCase().trim()) {
                guessesEl[currentAttempt].innerText = guess;
                guessesEl[currentAttempt].style.backgroundColor = "#d4edda";
                guessesEl[currentAttempt].style.borderColor = "#c3e6cb";
                endGame(true);
            } else {
                guessesEl[currentAttempt].innerText = guess === "Skipped" ? "Skipped" : guess;
                guessesEl[currentAttempt].style.backgroundColor = "#f8d7da";
                guessesEl[currentAttempt].style.borderColor = "#f5c6cb";
                
                currentAttempt++;
                if (currentAttempt >= 6) {
                    endGame(false);
                } else {
                    player.seekTo(startAt);
                    player.playVideo();
                    isPlaying = true;
                    playBtn.innerText = "Playing...";
                    startPolling();
                }
            }
        }
        
        skipBtn.addEventListener('click', () => handleGuess("Skipped"));

        guessBtn.addEventListener('click', () => {
            const guess = songInput.value;
            if (guess) {
                handleGuess(guess);
                songInput.value = ""; 
                list.innerHTML = "";   
            }
        });

        function endGame(won) {
            skipBtn.disabled = true;
            guessBtn.disabled = true;
            songInput.disabled = true;
            
            player.seekTo(startAt);
            player.playVideo();
            isPlaying = true;
            playBtn.innerText = "Playing...";
            updateStreak(won);
            startPolling();
            
            if (won) {
                gameWon = true;
                messageEl.innerText = "💜💜💜";
            } else {
                playBtn.disabled = true;
                messageEl.innerText = answer;
            }
        }

        function updateStreak(won) {
            const todayStr = new Date().toDateString();
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            const yesterdayStr = yesterday.toDateString();

            let streakData = JSON.parse(localStorage.getItem('livdleStreak')) || { current: 0, max: 0, lastPlayed: null };

            if (streakData.lastPlayed !== todayStr) {
                if (won) {
                    streakData.current = (streakData.lastPlayed === yesterdayStr) ? streakData.current + 1 : 1;
                    if (streakData.current > streakData.max) streakData.max = streakData.current;
                } else {
                    streakData.current = 0;
                }
                streakData.lastPlayed = todayStr;
                localStorage.setItem('livdleStreak', JSON.stringify(streakData));
            }

            loadStreakUI();
        }

        function loadStreakUI() {
            let streakData = JSON.parse(localStorage.getItem('livdleStreak')) || { current: 0, max: 0, lastPlayed: null };
            
            const todayStr = new Date().toDateString();
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            const yesterdayStr = yesterday.toDateString();

            if (streakData.lastPlayed !== null && streakData.lastPlayed !== todayStr && streakData.lastPlayed !== yesterdayStr) {
                streakData.current = 0;
                localStorage.setItem('livdleStreak', JSON.stringify(streakData));
            }

            const streakEl = document.getElementById('streak-display');
            if (streakEl) {
                streakEl.innerText = `Current Streak: ${streakData.current} | Max Streak: ${streakData.max}`;
            }
        }

        // Initialize game default targets instantly 
        loadDay(todayIndex);
        loadStreakUI();
    </script>
</body>
</html>
